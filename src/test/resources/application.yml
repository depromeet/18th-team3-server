spring:
  application:
    name: team3-test
  config:
    # 테스트 전용 환경변수 파일. 프로덕션 `.env` 와 분리되어 있어야 다음이 가능:
    #   - 테스트용 quota 제한 키를 별도로 운영 (프로덕션 키 소진 방지)
    #   - 로컬 개발자가 .env 를 건드리지 않고도 테스트 키만 바꿔볼 수 있음
    #   - CI 에서 테스트 전용 시크릿만 주입 가능
    # 파일이 없으면(optional) 조용히 넘어가고, @EnabledIfEnvironmentVariable 게이트가
    # 실제 API 호출 테스트를 skip 시킨다.
    import: optional:file:.env.test[.properties]

gemini:
  # 통합 테스트는 @EnabledIfEnvironmentVariable 로 실제 키 존재 시에만 실행됨.
  # 단, IDE 가 `@EnabledIf*` 조건을 비활성화한 채 실행하는 경우도 있어,
  # `.env.test` 가 없으면 dummy 값으로 기동 검증만 통과시키고 실제 API 호출 테스트는
  # 400 으로 자연스럽게 실패하도록 둔다.
  api-key: ${GEMINI_API_KEY:test-dummy-key}
  model: gemini-2.5-flash
