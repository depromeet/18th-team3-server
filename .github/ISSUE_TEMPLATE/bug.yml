name: "🐞 Bug"
description: "버그 제보"
labels: ["bug"]
body:
  - type: input
    id: parent_epic
    attributes:
      label: 상위 Epic
      placeholder: "#이슈번호 (없으면 비워두세요)"

  - type: textarea
    id: why
    attributes:
      label: 왜
      description: 증상, 재현 절차
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: 무엇을
      description: 기대 동작, 예상 범위
    validations:
      required: true

  - type: input
    id: due_date
    attributes:
      label: 마감일
      placeholder: "YYYY-MM-DD (없으면 비워두세요)"
