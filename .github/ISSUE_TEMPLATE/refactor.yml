name: "♻️ Refactor"
description: "리팩토링"
labels: ["refactor"]
body:
  - type: textarea
    id: parent_epic
    attributes:
      label: 상위 Epic
      placeholder: "#을 입력하면 이슈를 검색할 수 있습니다 (없으면 비워두세요)"

  - type: textarea
    id: why
    attributes:
      label: 왜
      description: 현재 구조의 문제, 필요성
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: 무엇을
      description: 개선 방향, 예상 범위
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: due_date
    attributes:
      label: 마감일
      placeholder: "MMDD (없으면 비워두세요)"
