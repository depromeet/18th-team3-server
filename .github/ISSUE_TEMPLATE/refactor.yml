name: "♻️ Refactor"
description: "리팩토링"
labels: ["refactor"]
body:
  - type: input
    id: parent_epic
    attributes:
      label: 상위 Epic
      placeholder: "#이슈번호 (없으면 비워두세요)"

  - type: textarea
    id: why
    attributes:
      label: 왜
      description: 현재 구조의 문제, 필요성
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: 무엇을
      description: 개선 방향, 예상 범위
    validations:
      required: true

  - type: input
    id: due_date
    attributes:
      label: 마감일
      placeholder: "YYYY-MM-DD (없으면 비워두세요)"
